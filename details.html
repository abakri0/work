<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>تفاصيل اليوم | فريق الفرسان</title>
    <style>
        :root {
            --primary: #d33427;
            --primary-dark: #89122a;
            --bg-light: #fef6f5;
            --text-dark: #1e1e2a;
            --instruction-bg: #ffefe5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Tajawal', sans-serif;
        }

        body {
            background: var(--bg-light);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 28px 20px;
            box-shadow: 0 25px 40px -15px rgba(137, 18, 42, 0.3);
            border: 1px solid rgba(211, 52, 39, 0.2);
        }

        .day-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 16px;
            margin-bottom: 25px;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 20px;
        }

        .day-badge {
            background: var(--primary);
            color: white;
            font-size: 1.7rem;
            font-weight: 800;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        .day-title {
            font-size: 1.9rem;
            color: var(--primary-dark);
            font-weight: 800;
            line-height: 1.2;
        }

        .links-list {
            list-style: none;
            margin: 30px 0;
        }

        .links-list li {
            background: #fef1ee;
            border: 1px solid var(--primary);
            border-radius: 60px;
            padding: 14px 20px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            transition: 0.2s;
        }

        .links-list li:hover {
            background: #ffe7e2;
        }

        .link-text {
            flex: 1;
            font-size: 1.2rem;
            word-break: break-word;
            color: var(--primary-dark);
            font-weight: 600;
        }

        .link-text a {
            text-decoration: none;
            color: var(--primary-dark);
            font-weight: 700;
            border-bottom: 2px dotted var(--primary);
            padding-bottom: 2px;
        }

        .link-text a:hover {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .copy-btn {
            background: white;
            border: 2px solid var(--primary);
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
            white-space: nowrap;
        }

        .copy-btn:active {
            background: var(--primary);
            color: white;
            transform: scale(0.95);
        }

        .instruction-box {
            background: var(--instruction-bg);
            border-right: 8px solid var(--primary-dark);
            padding: 20px 24px;
            border-radius: 40px;
            margin-top: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-dark);
            box-shadow: 0 5px 0 #bc2f23;
        }

        .instruction-box p {
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-home {
            display: inline-block;
            margin-top: 25px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            border: 2px solid var(--primary-dark);
            transition: 0.2s;
            text-align: center;
        }

        .back-home:hover {
            background: var(--primary-dark);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
            }
            .day-badge {
                font-size: 1.4rem;
                padding: 0.4rem 1rem;
            }
            .day-title {
                font-size: 1.6rem;
            }
            .link-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div>
            <img src="./logo.png" style="width: 50px;"/>
        </div>
    <div class="container" id="detailsContainer"></div>
    <div>
        
    </div>
    <script>
        // بيانات الأيام مع إضافة رابط الواتساب لليوم 0
        const daysData = {
            0: {
                name: 'الافتتاح',
                links: [
                    { text: '📁 ملف اليوم الافتتاحي', url: 'https://drive.google.com/drive/folders/1gcmWeBh3aVdSlWjq-z6GW3p6JmLCjyOB' },
                    { text: '🎥 لماذا نحن فائقون', url: 'https://youtu.be/4Wa5JporgoQ?si=MC-xRW-7AKoR4cyP' },
                    { text: '🔗 رابطة البيع المباشر', url: 'https://dsa.org.sa/' },
                    { text: '📱 قناة الفرسان (واتساب)', url: 'https://whatsapp.com/channel/0029VbCGPUC0lwgktzGLM11X' }
                ]
            },
            1: {
                name: 'التدريب',
                links: [
                    { text: '📁 فيديوهات اليوم الأول', url: 'https://drive.google.com/drive/folders/1jnNqc8G78qmdB08tFQ8EtSJZZ-0j8tXa' },
                    { text: '🐦 تغريدة روبرت كيوساكي', url: 'https://x.com/i/status/1996093754273370277' }
                ]
            },
            2: {
                name: 'الميلونير الفوري',
                links: [
                    { text: '📚 كتاب الميلونير الفوري', url: 'https://drive.google.com/drive/folders/1MQFQ4NZ95rjsqVATz-s42r75Mg54BNQr' }
                ]
            },
            3: {
                name: 'المرتكزات الأربعة',
                links: [
                    { text: '🎬 الحلم', url: 'https://drive.google.com/file/d/152QY60UK6IMce7FJBmoTGhF0qehdMtW9/view?usp=drivesdk' },
                    { text: '🎬 الالتزام', url: 'https://drive.google.com/file/d/1c0mAuStyLTOeB2zvvIiUDfBKWQIhZVVz/view?usp=drivesdk' },
                    { text: '🎬 الاستشارة', url: 'https://drive.google.com/file/d/1biDgCaMhYaw_Rd36nPPGhqFqmLjSN2t_/view?usp=drivesdk' },
                    { text: '🎬 الاستنساخ', url: 'https://drive.google.com/file/d/1tcCYpRD-NgnqyvgAnV64Yu3NKdJ_7JGJ/view?usp=drivesdk' }
                ]
            },
            4: {
                name: 'الختام',
                links: [
                    { text: '📹 اليوم الرابع', url: 'https://drive.google.com/file/d/1iJuihLxL2z_sD0TEotXYVwkgMFppuApx/view?usp=drivesdk' }
                ]
            }
        };

        const instructions = [
            '📝 مهم جداً كتابة جميع ملاحظاتك لمناقشتها بالجلسة',
            '📆 فيدباك يومي بعد جلسة المناقشة'
        ];

        const params = new URLSearchParams(window.location.search);
        const dayParam = params.get('day');
        const dayNumber = dayParam !== null ? parseInt(dayParam, 10) : null;

        const container = document.getElementById('detailsContainer');

        if (dayNumber === null || isNaN(dayNumber) || !daysData[dayNumber]) {
            container.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <h2 style="color: var(--primary-dark);">❌ اليوم غير موجود</h2>
                    <a href="index.html" class="back-home" style="margin-top:2rem;">العودة للرئيسية</a>
                </div>
            `;
        } else {
            const day = daysData[dayNumber];
            let linksHtml = '';
            day.links.forEach(link => {
                linksHtml += `
                    <li>
                        <span class="link-text"><a href="${link.url}" target="_blank" rel="noopener">${link.text}</a></span>
                        <button class="copy-btn" data-copy="${link.url}">📋 نسخ الرابط</button>
                    </li>
                `;
            });

            let instrHtml = '';
            instructions.forEach(text => {
                instrHtml += `<p><span>🔴</span> ${text}</p>`;
            });

            container.innerHTML = `
                <div class="day-header">
                    <span class="day-badge">اليوم ${dayNumber}</span>
                    <span class="day-title">${day.name}</span>
                </div>
                <ul class="links-list">${linksHtml}</ul>
                <div class="instruction-box">${instrHtml}</div>
            `;

            // أزرار النسخ
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const url = this.dataset.copy;
                    navigator.clipboard.writeText(url).then(() => {
                        const original = this.innerText;
                        this.innerText = '✅ تم';
                        this.style.background = '#20805c';
                        this.style.color = 'white';
                        this.style.borderColor = '#0c543a';
                        setTimeout(() => {
                            this.innerText = original;
                            this.style.background = '';
                            this.style.color = '';
                            this.style.borderColor = '';
                        }, 1500);
                    }).catch(() => alert('تعذر النسخ'));
                });
            });
        }
    </script>
</body>
</html>
