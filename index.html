<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>تدريب الفرسان | الأيام الخمسة</title>
    <style>
        /* الألوان الأساسية */
        :root {
            --primary: #d33427;
            --primary-dark: #89122a;
            --bg-light: #fef6f5;
            --text-dark: #1e1e2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo{
            display: flex;
            flex-direction: row;
            gap: 5px;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            color: var(--primary-dark);
            text-align: center;
            margin-bottom: 8px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .team-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.3rem 1.5rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 10px rgba(211, 52, 39, 0.3);
        }

        /* شبكة البطاقات */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 20px 0;
        }

        /* تصميم البطاقة */
        .card {
            background: white;
            border-radius: 36px;
            padding: 2rem 1.2rem;
            box-shadow: 0 10px 20px -8px rgba(137, 18, 42, 0.2);
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            text-align: center;
            width: 100%;
        }

        .card:active {
            transform: scale(0.98);
            background: #fff0ed;
            border-color: var(--primary);
        }

        .day-badge {
            background: var(--primary);
            color: white;
            padding: 0.3rem 1.2rem;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
            box-shadow: 0 3px 0 var(--primary-dark);
        }

        .card h3 {
            font-size: 1.9rem;
            color: var(--primary-dark);
            font-weight: 800;
        }

        /* تحسينات للشاشات المتوسطة والكبيرة */
        @media (min-width: 600px) {
            .cards-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .card {
                padding: 2.2rem 1rem;
            }
        }

        @media (min-width: 900px) {
            .cards-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 20px;
            }
        }

        /* تذييل بسيط (اختياري) */
        .footer-note {
            margin-top: 30px;
            color: var(--primary-dark);
            font-size: 1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="./logo.png" style="width: 50px;"/>
            <h1> أيام التدريب</h1>
        </div>
        
        <div style="text-align: center;">
            <span class="team-badge">فريق الفرسان</span>
        </div>

        <div class="cards-grid">
            <!-- اليوم 0 -->
            <div class="card" onclick="window.location.href='details.html?day=0'">
                <div class="day-badge">اليوم 0</div>
                <h3>الافتتاح</h3>
            </div>
            <!-- اليوم 1 -->
            <div class="card" onclick="window.location.href='details.html?day=1'">
                <div class="day-badge">اليوم 1</div>
                <h3>التدريب</h3>
            </div>
            <!-- اليوم 2 -->
            <div class="card" onclick="window.location.href='details.html?day=2'">
                <div class="day-badge">اليوم 2</div>
                <h3>الميلونير الفوري</h3>
            </div>
            <!-- اليوم 3 -->
            <div class="card" onclick="window.location.href='details.html?day=3'">
                <div class="day-badge">اليوم 3</div>
                <h3>المرتكزات الأربعة</h3>
            </div>
            <!-- اليوم 4 -->
            <div class="card" onclick="window.location.href='details.html?day=4'">
                <div class="day-badge">اليوم 4</div>
                <h3>الختام</h3>
            </div>
        </div>

        <div class="footer-note">
            فريق الفرسان - برنامج التدريب الداخلي
        </div>
    </div>
</body>
</html>
