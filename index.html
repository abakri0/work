<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>برنامج التدريب | الأيام الخمسة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Tajawal', sans-serif;
        }
        body {
            background: #f2f7fc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            max-width: 500px;  /* مناسب للجوال وأكبر بقليل */
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            color: #1e3a5f;
            margin-bottom: 8px;
            line-height: 1.2;
        }
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 24px 0;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 1.8rem 1rem;
            box-shadow: 0 10px 20px -5px rgba(0, 30, 60, 0.15);
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            width: 100%;
        }
        .card:active {
            transform: scale(0.98);
            background: #f0f7ff;
        }
        @media (min-width: 600px) {
            .cards-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
                max-width: 800px;
            }
            .card {
                padding: 2rem 1rem;
            }
        }
        @media (min-width: 900px) {
            .cards-grid {
                grid-template-columns: repeat(5, 1fr);
                max-width: 1200px;
            }
        }
        .day-badge {
            background: #1f6e9f;
            color: white;
            padding: 0.2rem 1.2rem;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .card h3 {
            font-size: 1.7rem;
            color: #0a3147;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 أيام التدريب</h1>
        <div class="cards-grid">
            <!-- اليوم 0 -->
            <div class="card" onclick="window.location.replace('details.html?day=0')">
                <div class="day-badge">اليوم 0</div>
                <h3>افتتاح التدريب</h3>
            </div>
            <!-- اليوم 1 -->
            <div class="card" onclick="window.location.replace('details.html?day=1')">
                <div class="day-badge">اليوم 1</div>
                <h3>افراغ الكأس</h3>
            </div>
            <!-- اليوم 2 -->
            <div class="card" onclick="window.location.replace('details.html?day=2')">
                <div class="day-badge">اليوم 2</div>
                <h3>الميلونير الفوري</h3>
            </div>
            <!-- اليوم 3 (تم تغيير العنوان) -->
            <div class="card" onclick="window.location.replace('details.html?day=3')">
                <div class="day-badge">اليوم 3</div>
                <h3>المرتكزات الأربعة</h3>
            </div>
            <!-- اليوم 4 -->
            <div class="card" onclick="window.location.replace('details.html?day=4')">
                <div class="day-badge">اليوم 4</div>
                <h3>تغيير نمط التفكير</h3>
            </div>
        </div>
    </div>
</body>
</html>
